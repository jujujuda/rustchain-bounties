name: "BCOS v2 Scan"
description: "Beacon Certified Open Source — run a BCOS v2 trust scan on any repository"
author: "Elyan Labs"
branding:
  icon: "shield"
  color: "green"

inputs:
  tier:
    description: "BCOS tier (L0, L1, L2). Default: L1"
    required: false
    default: "L1"
  reviewer:
    description: "Human reviewer name (for L1/L2 attestation)"
    required: false
    default: ""
  node-url:
    description: "RustChain node URL for attestation anchoring"
    required: false
    default: "https://50.28.86.131"
  repo-token:
    description: "GitHub token (GITHUB_TOKEN provided automatically)"
    required: true
    default: ${{ github.token }}
  post-comment:
    description: "Post results as PR comment"
    required: false
    default: "true"

outputs:
  trust_score:
    description: "BCOS trust score (0-100)"
    value: ${{ steps.run.outputs.trust_score }}
  cert_id:
    description: "BCOS certificate ID (BCOS-xxxxxxxx)"
    value: ${{ steps.run.outputs.cert_id }}
  tier_met:
    description: "Whether the scanned tier was met (true/false)"
    value: ${{ steps.run.outputs.tier_met }}

runs:
  using: "composite"
  steps:
    - id: run
      name: Run BCOS v2 Scan
      uses: ./
      with:
        tier: ${{ inputs.tier }}
        reviewer: ${{ inputs.reviewer }}
        node-url: ${{ inputs.node-url }}
        repo-token: ${{ inputs.repo-token }}
        post-comment: ${{ inputs.post-comment }}
